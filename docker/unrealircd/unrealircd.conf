/* UnrealIRCd 6 minimal configuration for Mercury integration testing.
 * Plain IRC on port 6667, no passwords, open server — local testing only.
 */

include "modules.default.conf";
include "operclass.default.conf";
include "snomasks.default.conf";

loadmodule "cloak_sha256";

/* Server identity */
me {
    name "mercury-test.local";
    info "Mercury IRC Test Server";
    sid "001";
}

/* Admin info */
admin {
    "Mercury Test";
    "mercury";
    "test@mercury.local";
}

/* Plain IRC listener on 6667 — no TLS required from clients */
listen {
    ip *;
    port 6667;
    options {
        clientsonly;
    }
}

/* TLS IRC listener on 6697 (required by UnrealIRCd 6) */
listen {
    ip *;
    port 6697;
    options {
        tls;
        clientsonly;
    }
}

/* Allow all connections from any IP without a password */
allow {
    match *;
    class clients;
    maxperip 50;
    options {
        noident;
    }
}

/* Connection classes */
class clients {
    pingfreq 90;
    maxclients 100;
    sendq 200k;
    recvq 8000;
}

/* Network settings */
set {
    network-name "MercuryTest";
    default-server "mercury-test.local";
    services-server "services.mercury-test.local";
    stats-server "stats.mercury-test.local";
    help-channel "#help";
    hiddenhost-prefix "Mercury";
    prefix-quit "Mercury";

    /* Required */
    kline-address "admin@mercury-test.local";

    /* TLS certificate (set::tls block, not a top-level tls-options block) */
    tls {
        certificate "/etc/unrealircd/tls/server.cert.pem";
        key "/etc/unrealircd/tls/server.key.pem";
    }

    /* Cloak keys — 80+ chars, mixed a-zA-Z0-9, required by UnrealIRCd */
    cloak-keys {
        "Xl16HyiA1UYKZFpyULYhVkINUE9kGtjttZ8wXrlucUGPqmh7Wjr42QK8mUuxZuToxSFyUUhI5ZWQugXYzed8bTOgYK";
        "Or8crttgxhqzSIeOwTeSb89XTIi7hVQgVcU8X9qlcbSc7SR8AJZEXYUNlPiwOKKsogis4w6VVNHCkn6Js2CHXPQBwP";
        "XfN20Pt3YH7T1bRT51XganICMV71kkn1xJG35KnOvbVJUbJow1HMzDpgOj9zlQnlaRMMFz2gfadYgegTTGW3ytIySm";
    }

    modes-on-connect "+i";
    modes-on-oper "+xwgs";
    modes-on-join "+nt";

    allowed-nickchars {
        latin1;
    }
}

/* Disable throttle modules entirely for local testing
 * (blacklist-module prevents the module from loading)
 */
blacklist-module connthrottle;
blacklist-module connect-flood;

/* MOTD/rules (empty files) */
tld {
    mask *;
    motd "ircd.motd";
    rules "ircd.rules";
}
